<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABH WhatsApp Chat</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #14171c;
        color: white;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100vh;
      }

      .sidebar {
        background: #1c2129;
        border-left: 1px solid #2a303b;
        padding: 16px;
      }

      .chat {
        display: flex;
        flex-direction: column;
      }

      .chat-header {
        padding: 16px;
        background: #1c2129;
        border-bottom: 1px solid #2a303b;
        font-weight: bold;
      }

      .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }

      .message {
        max-width: 60%;
        padding: 10px 14px;
        border-radius: 12px;
        margin-bottom: 10px;
      }

      .incoming {
        background: #2a303b;
        margin-left: auto;
      }

      .outgoing {
        background: #f5a623;
        color: #111;
        margin-right: auto;
      }

      .reply-box {
        display: flex;
        gap: 10px;
        padding: 16px;
        background: #1c2129;
        border-top: 1px solid #2a303b;
      }

      input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #2a303b;
        background: #10141a;
        color: white;
      }

      button {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: #f5a623;
        font-weight: bold;
        cursor: pointer;
      }

      .back {
        margin-bottom: 16px;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <button class="back" onclick="window.location.href = '/'">رجوع</button>
        <h3>المحادثات</h3>

        <div id="conversations">لا يوجد محادثات حالياً</div>
      </aside>

      <section class="chat">
        <div class="chat-header" id="chatTitle">اختر محادثة</div>

        <div class="messages" id="messages">
          <div class="message incoming">هنا ستظهر رسائل العملاء</div>
          <div class="message outgoing">وهنا ردودك من الداشبورد</div>
        </div>

        <div class="reply-box">
          <input id="replyText" placeholder="اكتب الرد هنا..." />
          <button onclick="sendReply()">إرسال</button>
        </div>
      </section>
    </div>

    <script>
      async function sendReply() {
        const replyText = document.getElementById("replyText").value.trim();

        if (!replyText) return alert("اكتب رسالة أولاً");

        alert("الخطوة الجاية بنربط هذا الزر مع WhatsApp API");
      }
    </script>
  </body>
</html>

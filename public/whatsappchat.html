<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABH WhatsApp Chat</title>

    <style>
      :root {
        --bg: #efeae2;
        --card: #ffffff;
        --border: #e9edef;
        --text: #111b21;
        --muted: #667781;
        --primary: #25d366;
        --primary-dark: #00a884;
        --bubble-in: #ffffff;
        --bubble-out: #d9fdd3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        height: 100vh;
      }

      .sidebar {
        background: var(--card);
        border-left: 1px solid var(--border);
        padding: 16px;
        overflow-y: auto;
      }

      .sidebar h3 {
        color: var(--text);
      }

      .chat {
        display: flex;
        flex-direction: column;
        background: var(--bg);
        height: 100vh;
      }

      .chat-header {
        padding: 16px;
        background: #f0f2f5;
        border-bottom: 1px solid var(--border);
        font-weight: bold;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Back button only shows on mobile */
      .back-btn {
        display: none;
        background: none;
        border: none;
        padding: 4px 6px;
        margin: 0;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        color: var(--text);
        font-weight: bold;
      }

      .back-btn:hover {
        background: rgba(0, 0, 0, 0.05);
        border-radius: 50%;
      }

      .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #efeae2;
      }

      .message {
        max-width: 60%;
        padding: 10px 14px;
        border-radius: 12px;
        margin-bottom: 10px;
        word-break: break-word;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
      }

      .message-time {
        font-size: 11px;
        color: #667781;
        margin-top: 6px;
        text-align: left;
      }

      .incoming {
        background: var(--bubble-in);
        color: var(--text);
        margin-left: auto;
      }

      .outgoing {
        background: var(--bubble-out);
        color: var(--text);
        margin-right: auto;
      }

      .reply-box {
        display: flex;
        gap: 10px;
        padding: 14px 16px;
        background: #f0f2f5;
        border-top: 1px solid var(--border);
      }

      input {
        flex: 1;
        padding: 13px 16px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        min-width: 0;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-dark);
        box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
      }

      button {
        padding: 12px 22px;
        border: none;
        border-radius: 24px;
        background: var(--primary-dark);
        color: #ffffff;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #008069;
      }

      .conversation {
        padding: 14px 10px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        border-radius: 10px;
      }

      .conversation:hover {
        background: #f0f2f5;
      }

      .phone {
        font-weight: bold;
        color: var(--text);
      }

      .last {
        color: var(--muted);
        font-size: 13px;
        margin-top: 5px;
      }

      /* ================= MOBILE RESPONSIVE (WhatsApp app style) ================= */
      @media (max-width: 800px) {
        .layout {
          display: block;
          position: relative;
          height: 100vh;
          overflow: hidden;
        }

        .sidebar {
          height: 100vh;
          width: 100%;
          border-left: none;
          position: absolute;
          top: 0;
          right: 0;
          left: 0;
          transform: translateX(0);
          transition: transform 0.25s ease;
          z-index: 1;
        }

        .chat {
          height: 100vh;
          width: 100%;
          position: absolute;
          top: 0;
          right: 0;
          left: 0;
          transform: translateX(100%);
          transition: transform 0.25s ease;
          z-index: 2;
        }

        /* When a chat is opened, slide chat in and sidebar out */
        .layout.chat-open .sidebar {
          transform: translateX(100%);
        }

        .layout.chat-open .chat {
          transform: translateX(0);
        }

        .back-btn {
          display: inline-block;
        }

        .message {
          max-width: 85%;
        }
      }
    </style>
  </head>

  <body>
    <div class="layout" id="layout">
      <aside class="sidebar">
        <h3>المحادثات</h3>
        <div id="conversations">Loading...</div>
      </aside>

      <section class="chat">
        <div class="chat-header">
          <button
            class="back-btn"
            onclick="closeChatMobile()"
            aria-label="رجوع"
          >
            →
          </button>
          <span id="chatTitle">اختر محادثة</span>
        </div>
        <div class="messages" id="messages">
          <div class="message incoming">هنا ستظهر رسائل العملاء</div>
        </div>

        <div class="reply-box">
          <input id="imageFile" type="file" accept="image/*" />
          <input id="replyText" placeholder="اكتب الرد هنا..." />
          <button onclick="sendSmartMessage()">إرسال</button>
        </div>
      </section>
    </div>

    <script>
      let selectedPhone = null;
      let lastMessagesCount = 0;

      const SYSTEM_MESSAGE_TYPES = ["system"];
      const SYSTEM_TEXT_PATTERNS = [
        /^Template sent to/i,
        /^Template accepted for/i,
        /^Template failed/i,
        /^Message status:/i,
        /^Message failed:/i,
        /^Image upload failed/i,
        /^Image send failed/i,
        /^Reply failed/i,
      ];

      function isSystemMessage(m) {
        if (SYSTEM_MESSAGE_TYPES.includes(m.message_type)) return true;
        if (m.status === "failed") return true;

        const text = m.message || "";
        return SYSTEM_TEXT_PATTERNS.some((pattern) => pattern.test(text));
      }

      function formatTime(dateString) {
        if (!dateString) return "";

        const date = new Date(dateString);

        return date.toLocaleTimeString("en-US", {
          hour: "numeric",
          minute: "2-digit",
        });
      }

      // Mobile view helpers (styling/UI state only, no data logic)
      function openChatMobile() {
        document.getElementById("layout").classList.add("chat-open");
      }

      function closeChatMobile() {
        document.getElementById("layout").classList.remove("chat-open");
      }

      async function loadConversations() {
        const box = document.getElementById("conversations");

        try {
          const res = await fetch("/api/get-conversations");
          const data = await res.json();

          if (!data.success || !data.conversations.length) {
            box.innerHTML = "لا يوجد محادثات حالياً";
            return;
          }

          box.innerHTML = data.conversations
            .map(
              (c) => `
          <div class="conversation" onclick="openChat('${c.phone}')">
            <div class="phone">${c.phone}</div>
            <div class="last">${c.last_message || ""}</div>
          </div>
        `,
            )
            .join("");
        } catch (err) {
          box.innerHTML = "حدث خطأ في تحميل المحادثات";
        }
      }

      async function openChat(phone) {
        selectedPhone = phone;
        document.getElementById("chatTitle").innerText = phone;

        // Slide to chat view on mobile
        openChatMobile();

        const messagesBox = document.getElementById("messages");
        messagesBox.innerHTML = "Loading...";

        const res = await fetch(`/api/get-messages?phone=${phone}`);
        const data = await res.json();

        if (!data.success || !data.messages.length) {
          messagesBox.innerHTML =
            "<div class='message incoming'>لا توجد رسائل</div>";
          return;
        }

        const visibleMessages = data.messages.filter(
          (m) => !isSystemMessage(m),
        );
        lastMessagesCount = visibleMessages.length;

        if (!visibleMessages.length) {
          messagesBox.innerHTML =
            "<div class='message incoming'>لا توجد رسائل</div>";
          return;
        }

        messagesBox.innerHTML = visibleMessages
          .map(
            (m) => `
        <div class="message ${m.direction === "incoming" ? "incoming" : "outgoing"}">
          <div>${m.message || ""}</div>
          <div class="message-time">
            ${formatTime(m.created_at || m.createdAt || m.inserted_at || m.timestamp)}
          </div>
        </div>
      `,
          )
          .join("");

        messagesBox.scrollTop = messagesBox.scrollHeight;
      }

      async function sendReply() {
        if (!selectedPhone) return alert("اختر محادثة أولاً");

        const input = document.getElementById("replyText");
        const replyText = input.value.trim();

        if (!replyText) return alert("اكتب رسالة أولاً");

        const res = await fetch("/api/send-reply", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            to: selectedPhone,
            message: replyText,
          }),
        });

        const data = await res.json();

        if (!data.success) {
          alert("فشل إرسال الرسالة: " + (data.error || ""));
          console.log(data);
          return;
        }

        input.value = "";
        openChat(selectedPhone);
        loadConversations();
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function sendImage() {
        if (!selectedPhone) return alert("اختر محادثة أولاً");

        const fileInput = document.getElementById("imageFile");
        const textInput = document.getElementById("replyText");

        if (!fileInput.files.length) {
          return alert("اختر صورة أولاً");
        }

        const file = fileInput.files[0];
        const imageBase64 = await fileToBase64(file);

        const res = await fetch("/api/send-image-message", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            to: selectedPhone,
            message: textInput.value.trim(),
            imageBase64,
            fileName: file.name,
            mimeType: file.type,
          }),
        });

        const data = await res.json();

        if (!data.success) {
          alert("فشل إرسال الصورة: " + (data.error || ""));
          console.log(data);
          return;
        }

        fileInput.value = "";
        textInput.value = "";

        openChat(selectedPhone);
        loadConversations();
      }

      async function sendSmartMessage() {
        const fileInput = document.getElementById("imageFile");
        const textInput = document.getElementById("replyText");

        const hasImage = fileInput.files.length > 0;
        const hasText = textInput.value.trim().length > 0;

        if (!hasImage && !hasText) {
          return alert("اكتب رسالة أو اختر صورة أولاً");
        }

        if (hasImage) {
          return sendImage();
        }

        return sendReply();
      }

      document
        .getElementById("replyText")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendReply();
          }
        });

      loadConversations();

      setInterval(async () => {
        loadConversations();

        if (!selectedPhone) return;

        const res = await fetch(`/api/get-messages?phone=${selectedPhone}`);
        const data = await res.json();

        if (!data.success || !data.messages) return;

        const visibleMessages = data.messages.filter(
          (m) => !isSystemMessage(m),
        );

        if (visibleMessages.length !== lastMessagesCount) {
          lastMessagesCount = visibleMessages.length;
          openChat(selectedPhone);
        }
      }, 5000);
    </script>
  </body>
</html>

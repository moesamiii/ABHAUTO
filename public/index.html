<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABH Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #050505;
        --card: #111111;
        --border: #2a2a2a;
        --text: #f5f5f5;
        --muted: #9a9a9a;
        --primary: #ffffff;
        --primary-dark: #b8b8b8;
        --danger: #ff4d4d;
        --success: #32d583;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1a1a1a, #050505 60%);
        color: var(--text);
        font-family: "Tajawal", sans-serif;
      }

      header {
        text-align: center;
        padding: 35px 20px 25px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        width: 90px;
        height: 90px;
        margin: auto;
        border-radius: 50%;
        background: #111;
        border: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        margin: 16px 0 4px;
        font-size: 24px;
      }

      .subtitle {
        color: var(--muted);
        margin: 0;
      }

      main {
        max-width: 950px;
        margin: auto;
        padding: 35px 18px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-weight: 700;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 13px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0d0d0d;
        color: var(--text);
        font-family: inherit;
        margin-bottom: 14px;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12);
      }

      button {
        width: 100%;
        padding: 13px;
        border: 0;
        border-radius: 10px;
        font-family: inherit;
        font-weight: 900;
        cursor: pointer;
        background: linear-gradient(
          180deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #000;
        margin-top: 8px;
      }

      .secondary {
        background: #101010;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .danger {
        background: transparent;
        color: var(--danger);
        border: 1px solid rgba(255, 77, 77, 0.45);
      }

      .contact {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 10px;
        background: #101010;
        direction: ltr;
      }

      .contact strong {
        color: var(--primary);
      }

      .contact button {
        width: auto;
        padding: 6px 10px;
        margin: 0;
        font-size: 12px;
      }

      #contactsList {
        max-height: 380px;
        overflow-y: auto;
        margin-top: 15px;
      }

      #status {
        margin-top: 15px;
        text-align: center;
        color: var(--muted);
        font-weight: 700;
      }

      footer {
        text-align: center;
        padding: 20px;
        color: var(--muted);
        border-top: 1px solid var(--border);
      }

      @media (max-width: 800px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="/logo.png" alt="ABH Logo" />
      </div>
      <h1>ABH WhatsApp Dashboard</h1>
      <p class="subtitle">مركز عناية السيارات — جدة</p>
    </header>

    <main>
      <div class="card">
        <h2>إضافة عميل</h2>

        <label>اسم العميل</label>
        <input id="name" placeholder="مثال: أحمد" />

        <label>رقم العميل</label>
        <input id="phone" placeholder="مثال: 9665XXXXXXXX" />

        <button onclick="addContact()">إضافة الرقم</button>

        <hr
          style="border: 0; border-top: 1px solid var(--border); margin: 22px 0"
        />

        <label>استيراد من Excel</label>
        <input
          type="file"
          id="excelFile"
          accept=".xlsx,.xls,.csv"
          onchange="importExcel(event)"
        />

        <p style="color: var(--muted); font-size: 13px">
          لازم يكون ملف الإكسل فيه أعمدة باسم:
          <br />
          <strong>name</strong> و <strong>number</strong>
        </p>

        <button class="secondary" onclick="window.location.href = '/chat.html'">
          فتح المحادثات
        </button>

        <button
          class="secondary"
          onclick="window.location.href = '/image-message.html'"
        >
          إرسال صورة مع نص
        </button>
      </div>

      <div class="card">
        <h2>قائمة الإرسال</h2>

        <div id="contactsList"></div>

        <button onclick="sendAll()">إرسال للجميع</button>
        <button class="danger" onclick="clearContacts()">مسح القائمة</button>

        <p id="status"></p>
      </div>
    </main>

    <footer>&copy; 2026 <strong>ABH Auto</strong> — جميع الحقوق محفوظة</footer>

    <script>
      let contacts = [];

      function cleanPhone(phone) {
        return String(phone || "").replace(/\D/g, "");
      }

      function addContact() {
        const name = document.getElementById("name").value.trim();
        const phone = cleanPhone(document.getElementById("phone").value);

        if (!phone) {
          alert("اكتب رقم العميل");
          return;
        }

        contacts.push({
          name: name || "عميلنا العزيز",
          phone,
        });

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";

        renderContacts();
      }

      function renderContacts() {
        const list = document.getElementById("contactsList");

        if (contacts.length === 0) {
          list.innerHTML = `<p style="color:#8a94a3;text-align:center;">لا يوجد أرقام بعد</p>`;
          return;
        }

        list.innerHTML = contacts
          .map(
            (c, index) => `
        <div class="contact">
          <div>
            <strong>${c.name}</strong><br />
            ${c.phone}
          </div>
          <button class="danger" onclick="removeContact(${index})">حذف</button>
        </div>
      `,
          )
          .join("");
      }

      function removeContact(index) {
        contacts.splice(index, 1);
        renderContacts();
      }

      function clearContacts() {
        contacts = [];
        renderContacts();
        document.getElementById("status").innerText = "";
      }

      async function importExcel(event) {
        const file = event.target.files[0];
        if (!file) return;

        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        rows.forEach((row) => {
          const name = row.name || row.Name || row["الاسم"] || "عميلنا العزيز";
          const phone = cleanPhone(
            row.number || row.Number || row.phone || row.Phone || row["الرقم"],
          );

          if (phone) {
            contacts.push({ name, phone });
          }
        });

        renderContacts();
        alert("تم استيراد الأرقام بنجاح");
      }

      async function sendAll() {
        const status = document.getElementById("status");

        if (contacts.length === 0) {
          alert("أضف أرقام أولاً");
          return;
        }

        let sent = 0;
        let failed = 0;

        status.innerText = "جاري الإرسال...";

        for (const contact of contacts) {
          try {
            const res = await fetch("/api/send-template", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                to: contact.phone,
                name: contact.name,
              }),
            });

            if (res.ok) {
              sent++;
            } else {
              failed++;
            }
          } catch (err) {
            failed++;
          }

          status.innerText = `✅ تم الإرسال: ${sent} | ❌ فشل: ${failed}`;
        }
      }

      renderContacts();
    </script>
  </body>
</html>

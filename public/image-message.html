<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إرسال صورة مع نص</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #050505;
        --card: #111111;
        --border: #2a2a2a;
        --text: #f5f5f5;
        --muted: #9a9a9a;
        --primary: #ffffff;
        --primary-dark: #b8b8b8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1a1a1a, var(--bg) 60%);
        color: var(--text);
        font-family: "Tajawal", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      }

      h1 {
        text-align: center;
        margin-top: 0;
        color: var(--text);
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        padding: 13px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0d0d0d;
        color: var(--text);
        font-family: inherit;
        margin-bottom: 16px;
        box-sizing: border-box;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12);
      }

      button {
        width: 100%;
        padding: 13px;
        border: 0;
        border-radius: 10px;
        font-family: inherit;
        font-weight: 900;
        cursor: pointer;
        background: linear-gradient(
          180deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #000;
        margin-top: 8px;
      }

      .back {
        background: #101010;
        color: var(--text);
        border: 1px solid var(--border);
      }

      #status {
        text-align: center;
        color: var(--muted);
        font-weight: 700;
        margin-top: 16px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>إرسال صورة مع نص</h1>

      <label>رقم العميل</label>
      <input id="phone" placeholder="9665XXXXXXXX" />

      <label>الصورة</label>
      <input type="file" id="imageFile" accept="image/*" />

      <label>النص</label>
      <textarea id="message" placeholder="اكتب النص هنا"></textarea>

      <button onclick="sendImage()">إرسال</button>
      <button class="back" onclick="window.location.href = '/'">رجوع</button>

      <p id="status"></p>
    </div>

    <script>
      function cleanPhone(phone) {
        return String(phone || "").replace(/\D/g, "");
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function sendImage() {
        const status = document.getElementById("status");
        const phone = cleanPhone(document.getElementById("phone").value);
        const file = document.getElementById("imageFile").files[0];
        const message = document.getElementById("message").value.trim();

        if (!phone) {
          alert("اكتب رقم العميل");
          return;
        }

        if (!file) {
          alert("اختر صورة");
          return;
        }

        status.innerText = "جاري إرسال رسالة الترحيب...";

        const helloRes = await fetch("/api/send-reply", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            to: phone,
            message: "Hello",
          }),
        });

        if (!helloRes.ok) {
          status.innerText = "❌ فشل إرسال Hello";
          return;
        }

        status.innerText = "تم إرسال Hello ✅ — انتظار 3 ثواني...";

        await new Promise((resolve) => setTimeout(resolve, 3000));

        status.innerText = "جاري إرسال الصورة...";

        const imageBase64 = await fileToBase64(file);

        const res = await fetch("/api/send-image-message", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            to: phone,
            message,
            imageBase64,
            fileName: file.name,
            mimeType: file.type,
          }),
        });

        if (res.ok) {
          status.innerText = "✅ تم إرسال الصورة بنجاح";
        } else {
          status.innerText = "❌ فشل الإرسال";
        }
      }
    </script>
  </body>
</html>
